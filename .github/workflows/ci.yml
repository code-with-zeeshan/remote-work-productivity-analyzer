# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  WORK_DIR: ProductivityAnalyzer

jobs:
  # ──── Lint & Format Check ────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dev-${{ hashFiles('ProductivityAnalyzer/requirements-dev.txt') }}

      - name: Install dev dependencies
        run: pip install -r ${{ env.WORK_DIR }}/requirements-dev.txt

      - name: Run Ruff (Linter)
        working-directory: ${{ env.WORK_DIR }}
        run: ruff check . --output-format=github

      - name: Run Black (Format Check)
        working-directory: ${{ env.WORK_DIR }}
        run: black --check --diff .

      - name: Run MyPy (Type Check)
        working-directory: ${{ env.WORK_DIR }}
        run: mypy config database tracking reporting services utils --ignore-missing-imports

  # ──── Unit Tests ────
  test:
    name: Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ProductivityAnalyzer/requirements-dev.txt') }}

      - name: Install dependencies
        run: pip install -r ${{ env.WORK_DIR }}/requirements-dev.txt

      - name: Run Tests with Coverage
        working-directory: ${{ env.WORK_DIR }}
        run: python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload Coverage to Codecov
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.WORK_DIR }}/coverage.xml
          fail_ci_if_error: false

  # ──── Security Audit ────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pip-audit
          pip install -r ${{ env.WORK_DIR }}/requirements.txt

      - name: Run pip-audit
        run: pip-audit --strict --desc
        continue-on-error: true

  # ──── Build Docker ────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t productivity-analyzer:latest -f ${{ env.WORK_DIR }}/Dockerfile ${{ env.WORK_DIR }}/

      - name: Test Docker Image
        run: docker run --rm productivity-analyzer:latest python -c "import config; print('Docker build OK')"
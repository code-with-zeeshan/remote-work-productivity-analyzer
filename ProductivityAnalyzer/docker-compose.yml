# ProductivityAnalyzer/docker-compose.yml
# Development environment with local PostgreSQL

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pa_postgres
    environment:
      POSTGRES_DB: defaultdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # For CI testing only (headless)
  app-test:
    build: .
    container_name: pa_test
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: postgres
      DB_PASSWORD: devpassword123
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: defaultdb
      DEBUG: "true"
    command: python -m pytest tests/ -v

volumes:
  pgdata: